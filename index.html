<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我適文創 假勤申請</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --theme:        #4DB860;
      --theme-light:  #EEF9F1;
      --theme-shadow: rgba(77,184,96,0.25);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: linear-gradient(150deg, #FEF0F2 0%, #EEF7FD 50%, #EEF9F1 100%);
      background-attachment: fixed;
      min-height: 100vh;
      padding: 20px 16px 48px;
    }

    .container { max-width: 560px; margin: 0 auto; }

    /* Header */
    header {
      text-align: center;
      padding: 16px 24px 14px;
      background: white;
      border-radius: 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #E8637A, #5AADD6, #4DB860);
    }
    header img { height: 160px; display: block; margin: 0 auto 10px; }
    header p { font-size: 13px; color: #94a3b8; }

    /* Saved info notice */
    .saved-notice {
      font-size: 12px;
      color: #4DB860;
      text-align: center;
      margin-top: 6px;
      display: none;
    }
    .saved-notice.show { display: block; }

    /* Tabs */
    .tabs {
      display: flex;
      background: white;
      border-radius: 14px;
      padding: 5px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-size: 14px;
      color: #94a3b8;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.22s;
      font-family: inherit;
    }
    .tab-btn.active {
      background: var(--theme);
      color: white;
      box-shadow: 0 2px 10px var(--theme-shadow);
    }

    /* Card */
    .form-card {
      background: white;
      border-radius: 18px;
      padding: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      display: none;
      overflow: hidden;
    }
    .form-card.active { display: block; }

    .card-header {
      background: var(--theme);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-header-title {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }
    .card-header-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      margin-top: 1px;
    }
    .card-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.25);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .card-body { padding: 20px 20px 24px; }

    /* Form fields */
    .form-group { margin-bottom: 15px; }
    label.field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    .req { color: #ef4444; margin-left: 2px; }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      font-size: 15px;
      color: #1e293b;
      background: #fafafa;
      font-family: inherit;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--theme);
      background: white;
      box-shadow: 0 0 0 3px var(--theme-shadow);
    }
    textarea { resize: vertical; min-height: 76px; line-height: 1.5; }

    input.readonly-date {
      background: #f1f5f9;
      color: #64748b;
      cursor: default;
      border-color: #e2e8f0;
    }
    input.readonly-date:focus {
      border-color: #e2e8f0;
      background: #f1f5f9;
      box-shadow: none;
    }

    /* Date range */
    .date-range-row { display: flex; align-items: flex-end; gap: 8px; }
    .date-range-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .date-sub-label { font-size: 11px; color: #94a3b8; font-weight: 500; }
    .date-range-sep { color: #cbd5e1; font-size: 18px; padding-bottom: 11px; flex-shrink: 0; }
    .days-badge {
      display: none;
      margin-top: 8px;
      background: var(--theme-light);
      color: #1e293b;
      border: 1px solid var(--theme);
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
    }
    .days-badge.show { display: inline-block; }
    .days-badge.warn { background: #fee2e2; color: #991b1b; border-color: #fecaca; }

    .hint { font-size: 12px; color: #94a3b8; margin-top: 5px; line-height: 1.4; }

    /* Radio */
    .radio-group { display: flex; flex-direction: column; gap: 7px; }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .radio-item:has(input:checked) {
      border-color: var(--theme);
      background: var(--theme-light);
    }
    .radio-item input[type="radio"] {
      width: 16px; height: 16px;
      accent-color: var(--theme);
      flex-shrink: 0;
    }
    .radio-item span { font-size: 14px; color: #374151; cursor: pointer; }

    /* Alert */
    .alert {
      padding: 13px 15px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
      line-height: 1.5;
      display: none;
    }
    .alert.success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .alert.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--theme);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.1s;
      margin-top: 6px;
      font-family: inherit;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px var(--theme-shadow);
    }
    .submit-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    hr.divider { border: none; border-top: 1.5px solid #f1f5f9; margin: 20px 0; }
    footer { text-align: center; padding: 24px 0 0; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <img src="logo.png" alt="我適文創">
    <p>請選擇申請類型後填寫並送出</p>
    <p class="saved-notice" id="saved-notice">已自動帶入上次填寫的姓名與 Email</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('leave')">請假申請</button>
    <button class="tab-btn"        onclick="switchTab('trip')">出差申請</button>
    <button class="tab-btn"        onclick="switchTab('overtime')">加班申請</button>
  </div>

  <!-- ===== 請假申請 ===== -->
  <div id="leave-form" class="form-card active">
    <div class="card-header">
      <div class="card-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="15" x2="10" y2="15"/><polyline points="9 15 11 17 15 13"/>
        </svg>
      </div>
      <div>
        <div class="card-header-title">請假申請單</div>
        <div class="card-header-sub">特休・補休・事假・病假・其他</div>
      </div>
    </div>
    <div class="card-body">
      <div id="leave-alert" class="alert"></div>
      <form onsubmit="submitForm(event,'leave')">
        <div class="form-group">
          <label class="field-label">申請日期</label>
          <input type="text" class="readonly-date" readonly tabindex="-1">
        </div>
        <div class="form-group">
          <label class="field-label">申請人姓名<span class="req">*</span></label>
          <input type="text" name="name" class="autofill-name" required placeholder="請輸入姓名">
        </div>
        <div class="form-group">
          <label class="field-label">電子郵件<span class="req">*</span></label>
          <input type="email" name="email" class="autofill-email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label class="field-label">請假類別<span class="req">*</span></label>
          <div class="radio-group">
            <label class="radio-item"><input type="radio" name="leaveType" value="特休" required><span>特休</span></label>
            <label class="radio-item"><input type="radio" name="leaveType" value="補休"><span>補休</span></label>
            <label class="radio-item"><input type="radio" name="leaveType" value="事假"><span>事假</span></label>
            <label class="radio-item"><input type="radio" name="leaveType" value="病假"><span>病假</span></label>
            <label class="radio-item"><input type="radio" name="leaveType" value="其他"><span>其他（請在事由說明）</span></label>
          </div>
        </div>
        <div class="form-group">
          <label class="field-label">請假日期<span class="req">*</span></label>
          <div class="date-range-row">
            <div class="date-range-field">
              <span class="date-sub-label">開始日期</span>
              <input type="date" id="leaveStart" name="leaveStart" required oninput="calcDays('leave')">
            </div>
            <span class="date-range-sep">→</span>
            <div class="date-range-field">
              <span class="date-sub-label">結束日期（超過一日以上）</span>
              <input type="date" id="leaveEnd" name="leaveEnd" oninput="calcDays('leave')">
            </div>
          </div>
          <div id="leave-days" class="days-badge"></div>
        </div>
        <div class="form-group">
          <label class="field-label">請假事由說明</label>
          <input type="text" name="reason" placeholder="請補充說明事由（選填）">
        </div>
        <hr class="divider">
        <button type="submit" class="submit-btn">送出申請</button>
      </form>
    </div>
  </div>

  <!-- ===== 出差申請 ===== -->
  <div id="trip-form" class="form-card">
    <div class="card-header">
      <div class="card-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </div>
      <div>
        <div class="card-header-title">出差申請單</div>
        <div class="card-header-sub">專櫃・展場・外勤</div>
      </div>
    </div>
    <div class="card-body">
      <div id="trip-alert" class="alert"></div>
      <form onsubmit="submitForm(event,'trip')">
        <div class="form-group">
          <label class="field-label">申請日期</label>
          <input type="text" class="readonly-date" readonly tabindex="-1">
        </div>
        <div class="form-group">
          <label class="field-label">申請人姓名<span class="req">*</span></label>
          <input type="text" name="name" class="autofill-name" required placeholder="請輸入姓名">
        </div>
        <div class="form-group">
          <label class="field-label">電子郵件<span class="req">*</span></label>
          <input type="email" name="email" class="autofill-email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label class="field-label">出差日期<span class="req">*</span></label>
          <div class="date-range-row">
            <div class="date-range-field">
              <span class="date-sub-label">開始日期</span>
              <input type="date" id="tripStart" name="tripStart" required oninput="calcDays('trip')">
            </div>
            <span class="date-range-sep">→</span>
            <div class="date-range-field">
              <span class="date-sub-label">結束日期（超過一日以上）</span>
              <input type="date" id="tripEnd" name="tripEnd" oninput="calcDays('trip')">
            </div>
          </div>
          <div id="trip-days" class="days-badge"></div>
        </div>
        <div class="form-group">
          <label class="field-label">出差時間<span class="req">*</span></label>
          <input type="text" name="tripTime" required placeholder="例：09:00–18:00">
        </div>
        <div class="form-group">
          <label class="field-label">地點（專櫃／展場－縣市）</label>
          <input type="text" name="location" placeholder="例：微風南山專櫃－台北市">
        </div>
        <div class="form-group">
          <label class="field-label">事由<span class="req">*</span></label>
          <textarea name="reason" required placeholder="請說明出差原因"></textarea>
        </div>
        <hr class="divider">
        <button type="submit" class="submit-btn">送出申請</button>
      </form>
    </div>
  </div>

  <!-- ===== 加班申請 ===== -->
  <div id="overtime-form" class="form-card">
    <div class="card-header">
      <div class="card-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div>
        <div class="card-header-title">加班申請單</div>
        <div class="card-header-sub">正常工時以外的工作申請</div>
      </div>
    </div>
    <div class="card-body">
      <div id="overtime-alert" class="alert"></div>
      <form onsubmit="submitForm(event,'overtime')">
        <div class="form-group">
          <label class="field-label">申請日期</label>
          <input type="text" class="readonly-date" readonly tabindex="-1">
        </div>
        <div class="form-group">
          <label class="field-label">申請人姓名<span class="req">*</span></label>
          <input type="text" name="name" class="autofill-name" required placeholder="請輸入姓名">
        </div>
        <div class="form-group">
          <label class="field-label">電子郵件<span class="req">*</span></label>
          <input type="email" name="email" class="autofill-email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label class="field-label">加班日期<span class="req">*</span></label>
          <input type="date" name="overtimeDate" required>
        </div>
        <div class="form-group">
          <label class="field-label">加班時間<span class="req">*</span></label>
          <input type="text" name="overtimeTime" required placeholder="例：18:00–22:00">
        </div>
        <div class="form-group">
          <label class="field-label">事由<span class="req">*</span></label>
          <textarea name="reason" required placeholder="請說明加班原因"></textarea>
        </div>
        <hr class="divider">
        <button type="submit" class="submit-btn">送出申請</button>
      </form>
    </div>
  </div>

  <footer>我適文創內部系統 · 如有問題請聯繫人資</footer>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJb4OQaMQb2Cu1vCAmJrCVEZtcpV1cxPvUjmCoATSnoh4P_-YhZdP62y8DwQy_MOIUtA/exec';

  const TABS = ['leave', 'trip', 'overtime'];

  const THEMES = {
    leave:    { main: '#E8637A', light: '#FEF0F2', shadow: 'rgba(232,99,122,0.22)' },
    trip:     { main: '#5AADD6', light: '#EEF7FD', shadow: 'rgba(90,173,214,0.22)' },
    overtime: { main: '#4DB860', light: '#EEF9F1', shadow: 'rgba(77,184,96,0.22)'  },
  };

  // 今天日期
  const todayStr = new Date().toLocaleDateString('zh-TW', {
    timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit'
  });
  document.querySelectorAll('.readonly-date').forEach(el => el.value = todayStr);

  // 自動帶入上次填寫的姓名和 Email
  const savedName  = localStorage.getItem('iam_name')  || '';
  const savedEmail = localStorage.getItem('iam_email') || '';
  if (savedName || savedEmail) {
    document.querySelectorAll('.autofill-name').forEach(el => el.value = savedName);
    document.querySelectorAll('.autofill-email').forEach(el => el.value = savedEmail);
    document.getElementById('saved-notice').classList.add('show');
  }

  // 套用主題色
  function applyTheme(type) {
    const t = THEMES[type];
    const root = document.documentElement.style;
    root.setProperty('--theme',        t.main);
    root.setProperty('--theme-light',  t.light);
    root.setProperty('--theme-shadow', t.shadow);
  }

  function switchTab(type) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', TABS[i] === type);
    });
    document.querySelectorAll('.form-card').forEach(c => c.classList.remove('active'));
    document.getElementById(type + '-form').classList.add('active');
    applyTheme(type);
  }

  // 計算天數
  function calcDays(prefix) {
    const startVal = document.getElementById(prefix + 'Start').value;
    const endVal   = document.getElementById(prefix + 'End').value;
    const badge    = document.getElementById(prefix + '-days');
    if (!startVal) { badge.className = 'days-badge'; return; }
    if (!endVal)   { badge.className = 'days-badge show'; badge.textContent = '共 1 天'; return; }
    const s = new Date(startVal), e = new Date(endVal);
    if (e < s) {
      badge.className = 'days-badge show warn';
      badge.textContent = '⚠ 結束日期不能早於開始日期';
      return;
    }
    const days = Math.round((e - s) / 86400000) + 1;
    badge.className = 'days-badge show';
    badge.textContent = `共 ${days} 天`;
  }

  function fmtDate(val) {
    if (!val) return '';
    const d = new Date(val);
    return `${d.getMonth() + 1}/${d.getDate()}`;
  }

  async function submitForm(event, type) {
    event.preventDefault();
    const form    = event.target;
    const btn     = form.querySelector('.submit-btn');
    const alertEl = document.getElementById(type + '-alert');

    if (type === 'leave' || type === 'trip') {
      const p = type === 'leave' ? 'leave' : 'trip';
      const s = document.getElementById(p + 'Start').value;
      const e = document.getElementById(p + 'End').value;
      if (e && new Date(e) < new Date(s)) {
        showAlert(alertEl, 'error', '⚠ 結束日期不能早於開始日期，請確認後再送出。');
        return;
      }
    }

    btn.disabled = true;
    btn.textContent = '送出中…';
    alertEl.style.display = 'none';

    const now = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
    const data = new URLSearchParams();
    data.append('type', type);
    data.append('submittedAt', now);
    new FormData(form).forEach((v, k) => data.append(k, v));

    if (type === 'leave') {
      const s = document.getElementById('leaveStart').value;
      const e = document.getElementById('leaveEnd').value;
      const days = e ? Math.round((new Date(e) - new Date(s)) / 86400000) + 1 : 1;
      data.set('leaveDates', e && e !== s ? `${fmtDate(s)} – ${fmtDate(e)}（共 ${days} 天）` : `${fmtDate(s)}（共 1 天）`);
    }
    if (type === 'trip') {
      const s = document.getElementById('tripStart').value;
      const e = document.getElementById('tripEnd').value;
      const days = e ? Math.round((new Date(e) - new Date(s)) / 86400000) + 1 : 1;
      data.set('tripDate', e && e !== s ? `${fmtDate(s)} – ${fmtDate(e)}（共 ${days} 天）` : `${fmtDate(s)}（共 1 天）`);
    }

    try {
      await fetch(SCRIPT_URL, { method: 'POST', body: data, mode: 'no-cors' });

      // 儲存姓名和 Email 供下次使用
      const name  = form.querySelector('[name="name"]').value;
      const email = form.querySelector('[name="email"]').value;
      localStorage.setItem('iam_name',  name);
      localStorage.setItem('iam_email', email);
      document.getElementById('saved-notice').classList.add('show');

      showAlert(alertEl, 'success', '✓ 申請已送出！通知信已寄出，感謝填寫。');
      form.reset();
      form.querySelector('.readonly-date').value = todayStr;
      // reset 後重新帶入已記住的姓名和 Email
      form.querySelector('.autofill-name').value  = name;
      form.querySelector('.autofill-email').value = email;
      const badge = form.querySelector('.days-badge');
      if (badge) badge.className = 'days-badge';
    } catch {
      showAlert(alertEl, 'error', '⚠ 網路異常，請稍後再試，或直接聯繫人資。');
    } finally {
      btn.disabled = false;
      btn.textContent = '送出申請';
    }
  }

  function showAlert(el, type, msg) {
    el.className = 'alert ' + type;
    el.textContent = msg;
    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
</script>
</body>
</html>
